# ============================================
# g1_yolo_nav_py 参数配置
# ============================================

# ---- YOLO 检测节点参数 ----
g1_yolo_detector_node:
  ros__parameters:
    model_path: "yolo_v11x_best.pt"           # YOLO 模型文件路径
    confidence_threshold: 0.5                 # 检测置信度阈值
    nms_threshold: 0.45                       # NMS IoU 阈值
    input_image_topic: "/robot1/D455_1/color/image_raw"  # D455 彩色图像话题
    output_detection_topic: "/g1/vision/detections"  # 检测结果话题
    target_classes: ["chair"]                   # 目标类别名称（也支持数字 ID）
    max_image_size: 640                       # 推理图像尺寸

# ---- 空间投影节点参数 ----
g1_spatial_target_node:
  ros__parameters:
    detection_topic: "/g1/vision/detections"  # 检测结果输入话题
    depth_topic: "/robot1/D455_1/depth/image_rect_raw"    # D455 校正深度图话题
    camera_info_topic: "/robot1/D455_1/color/camera_info"  # D455 彩色相机内参话题
    target_frame: "odom"                      # 目标坐标系
    base_frame: "base_link"                   # 机器人基座坐标系
    camera_frame: "robot1/D455_1_color_optical_frame"  # D455 相机坐标系
    target_class_id: "chair"                  # 要追踪的目标类别名称
    default_depth: 2.0                        # 默认目标距离 (m)
    use_depth_sensor: false                   # 是否使用深度传感器
    nav_target_topic: "/g1/nav/target_pose"   # 导航目标发布话题
    approach_distance: 0.8                    # 接近目标后停下的距离 (m)
    publish_rate: 5.0                         # 目标位姿发布频率 (Hz)

# ---- 导航规划节点参数 ----
g1_nav_planner_node:
  ros__parameters:
    target_topic: "/g1/nav/target_pose"       # 目标位姿输入话题
    cmd_vel_topic: "/cmd_vel"                 # 速度指令输出话题
    max_linear_speed: 0.3                     # 最大线速度 (m/s), 范围 [0.0, 1.0]
    max_angular_speed: 0.5                    # 最大角速度 (rad/s), 范围 [0.0, 2.0]
    goal_tolerance: 0.3                       # 到达容差 (m)
    navigation_server: "navigate_to_pose"     # Nav2 action 名称
    use_nav2: true                            # 是否使用 Nav2 导航

# ---- 偏航对齐节点参数（机器人旋转，非腰部旋转）----
g1_yaw_align_node:
  ros__parameters:
    detection_topic: "/g1/vision/detections"  # 检测结果输入
    target_class_id: "chair"                  # 目标类别
    camera_fov_deg: 87.0                      # D455 水平视场角
    center_tolerance: 0.05                    # 居中容差（归一化）
    yaw_kp: 2.0                               # 偏航 P 增益
    max_yaw_speed: 0.6                        # 最大偏航速度 rad/s
    cmd_vel_topic: "/cmd_vel"                 # 速度指令输出话题
    control_rate: 10.0                        # 控制频率 Hz
    lost_timeout: 1.0                         # 目标丢失超时 s

# ---- 前进控制节点参数（Sport API）----
g1_loco_forward_node:
  ros__parameters:
    detection_topic: "/g1/vision/detections"  # 检测结果输入
    target_class_id: "chair"                  # 目标类别
    forward_speed: 0.3                        # 前进速度 m/s
    forward_duration: 0.5                     # SET_VELOCITY 持续时间 s
    center_tolerance: 0.08                    # 居中容差
    align_stable_time: 0.8                    # 对齐稳定时间 s
    arrive_bbox_ratio: 0.45                   # 到达条件：检测框占比
    lost_timeout: 1.0                         # 目标丢失超时 s
    check_rate: 10.0                          # 检查频率 Hz
